name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    env:
      PLAYWRIGHT: "true"
      AUTH_SECRET: "ci-auth-secret"
      POSTGRES_URL: "postgres://postgres:postgres@127.0.0.1:5432/postgres"
      BLOB_READ_WRITE_TOKEN: "ci-blob-token"
      REDIS_URL: "redis://127.0.0.1:6379"

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright core scenarios
        run: pnpm exec playwright test tests/e2e/phase-c-core.test.ts --project=e2e

      - uses: actions/upload-artifact@v4
        if: always() && !cancelled()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
